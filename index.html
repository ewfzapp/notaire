<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calcul des Frais de Notaire 2026 – Estimation | Service Express</title>
  <style>
    :root { --bg: #020617; --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); --purple: #a78bfa; --accent: #7c3aed; --text: #e2e8f0; --muted: #94a3b8; --green: #34d399; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 0 16px 60px; }
    header { text-align: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
    .nav-top { max-width: 800px; margin: 0 auto 20px; text-align: left; }
    .nav-top a { color: var(--muted); font-size: 13px; text-decoration: none; }
    h1 { font-size: 28px; color: var(--purple); }
    .ad-placeholder { background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; margin: 20px auto; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; min-height: 90px; max-width: 800px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; margin-top: 15px; }
    input, select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 16px; outline: none; }
    .result-box { text-align: center; padding: 30px; background: rgba(167,139,250,0.05); border: 2px solid var(--purple); border-radius: 20px; margin-top: 20px; display: none; }
    .result-val { font-size: 48px; font-weight: 800; color: var(--purple); }
    footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
    a { color: var(--purple); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="nav-top"><a href="https://service-express.org">← Retour au portail</a></div>
    <h1>📜 Frais de <span>Notaire</span></h1>
    <p style="color:var(--muted)">Estimation précise pour votre achat immobilier</p>
  </header>
  <div class="ad-placeholder">Publicité AdSense - Bannière</div>
  <main class="container">
    <div class="card">
      <label>Prix de vente du bien (€)</label>
      <input type="number" id="prix" placeholder="250000" oninput="calculer()">
      <label>Type de bien</label>
      <select id="type" onchange="calculer()">
        <option value="ancien">Ancien (env. 8%)</option>
        <option value="neuf">Neuf / VEFA (env. 2-3%)</option>
      </select>
    </div>
    <div id="result" class="result-box">
      <div style="font-size:14px; color:var(--muted); text-transform:uppercase;">Estimation des frais</div>
      <div class="result-val" id="res-frais">0 €</div>
      <p id="res-total" style="margin-top:10px;"></p>
    </div>
  </main>
  <footer>
    <p>© 2026 Service Express · <a href="privacy.html">Confidentialité</a> · <a href="legal.html">Mentions Légales</a></p>
  </footer>
  <script>
    function calculer() {
      const prix = parseFloat(document.getElementById('prix').value) || 0;
      const type = document.getElementById('type').value;
      if (prix <= 0) return;
      let taux = (type === 'neuf') ? 0.025 : 0.08;
      const frais = prix * taux;
      document.getElementById('result').style.display = 'block';
      document.getElementById('res-frais').textContent = Math.round(frais).toLocaleString('fr-FR') + ' €';
      document.getElementById('res-total').textContent = `Coût total estimé : ${Math.round(prix + frais).toLocaleString('fr-FR')} €`;
    }
  </script>
</body>
</html>
